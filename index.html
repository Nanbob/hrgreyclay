<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>HR Grey Clay — Hand‑thrown stoneware ceramics</title>
  <meta name="description" content="Hand-thrown stoneware ceramics from Liverpool. Minimal, earthy pieces by HR Grey Clay." />

  <!-- Canonical (prefer non‑www) -->
  <link rel="canonical" href="https://hrgreyclay.co.uk/" />

  <!-- Open Graph / Twitter -->
  <meta property="og:title" content="HR Grey Clay" />
  <meta property="og:description" content="Hand-thrown stoneware ceramics from Liverpool." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://hrgreyclay.co.uk/" />
  <meta property="og:image" content="https://hrgreyclay.co.uk/images/cats-figurines.jpg" />
  <meta name="twitter:card" content="summary_large_image" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 512 512"
             width="26" height="26"
             xmlns="http://www.w3.org/2000/svg"
             aria-hidden="true" focusable="false">
          <path fill="var(--rust)"
            d="M118.9 20.13l-16.4 7.56c21.9 47.21 55.3 102.71 90.7 152.61C127.8 322 18.79 349.2 29.06 377.1 80.7 517.8 239.3 503.5 314.3 467.7c27.5-13.1 5.1-61.3-6-94 20.6 25.8 61.5 67.9 77.1 58.6 95.9-57.3 119-164 80.5-267.8-20.2-54.4-116.3 31.7-257.6 5.8-35-49.2-68.2-104.28-89.4-150.17z"/>
        </svg>
      </span>
      <h1 class="brand">
        HR Grey Clay
      </h1>

      <nav class="nav">
        <a class="nav-link" href="https://instagram.com/hrgrey.clay" target="_blank" rel="noopener">Instagram</a>
        <a class="button email" href="mailto:hrgrey.clay@gmail.com">Email me</a>
      </nav>
    </div>
  </header>

  <main>
    <!-- Hero / Intro -->
    <section class="hero">
      <div class="container">
        <p class="tagline">Hand‑thrown stoneware ceramics from Liverpool</p>
      </div>
    </section>

    <!-- Gallery -->
    <section class="gallery-section">
      <div class="container">
        <div class="grid">
          <!-- Each image: small hover expand + caption on zoom -->
          <figure class="card">
            <img src="images/cat-collection.jpg" alt="Collection of stoneware cats" loading="lazy" data-caption="Collection of stoneware cats" />
          </figure>
          
          <figure class="card">
            <img src="images/stripe-mugs.jpg" alt="Mugs with underglaze stripes" loading="lazy" data-caption="Mugs with underglaze stripes" />
          </figure>
          
          <figure class="card">
            <img src="images/iron-mugs.jpg" alt="iron glazed mugs" loading="lazy" data-caption="Iron glazed mugs" />
          </figure>
          
          <figure class="card">
            <img src="images/flux-mugs.jpg" alt="Flux glazed mugs" loading="lazy" data-caption="Flux glazed mugs" />
          </figure>

          <figure class="card">
            <img src="images/matte-bud-vases.jpg" alt="Small matte bud vases" loading="lazy" data-caption="Bud vases - slip texture applied before glazing" />
          </figure>
          
          <figure class="card">
            <img src="images/glossy-bud-vases.jpg" alt="Small shiny bud vases" loading="lazy" data-caption="Bud vases - shiny glazes combinations and texture" />
          </figure>
          
          <figure class="card">
            <img src="images/cats-figurines.jpg" alt="Small blue and white cat figurines arranged on a wooden table" loading="lazy" data-caption="Cat figurines and jars — stoneware, cobalt oxide" />
          </figure>

          <figure class="card">
            <img src="images/cups-stacked-rust.jpg" alt="Stack of rust-coloured glaze espresso cups" loading="lazy" data-caption="Rust and shino cups — speckled stoneware clay" />
          </figure>

          <figure class="card">
            <img src="images/cups-stacked-sand.jpg" alt="Stack cups with textured glaze" loading="lazy" data-caption="Gas fired mugs - flashes of red an unexpected surprise" />
          </figure>

          <figure class="card">
            <img src="images/mini-vases-green.jpg" alt="Four miniature vases in varied green glazes" loading="lazy" data-caption="Mini vases — moss glazes and copper oxide" />
          </figure>

          <figure class="card">
            <img src="images/leaf-etched-cup.jpg" alt="Cup with delicate leaf etching held in a hand" loading="lazy" data-caption="Lead imprint cup with iron oxide" />
          </figure>

          <figure class="card">
            <img src="images/small-brown-vase.jpg" alt="Small brown stoneware vase with carved vertical lines" loading="lazy" data-caption="Small carved vase — ash brown" />
          </figure>

          <figure class="card">
            <img src="images/lidded-jars.jpg" alt="Three lidded jars topped with small animal figures" loading="lazy" data-caption="Lidded jars with cat sculpted handles" />
          </figure>

          <figure class="card">
            <img src="images/mugs-white.jpg" alt="Two white stoneware mugs stacked, with brush texture" loading="lazy" data-caption="White mugs — brushed slip texture" />
          </figure>

          <figure class="card">
            <img src="images/mugs-bluegreen.jpg" alt="Two blue-green mugs stacked, speckled glaze" loading="lazy" data-caption="Blue-green mugs — speckled glaze" />
          </figure>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© <span id="year"></span> HR Grey Clay · Liverpool, UK</p>
      <p>
        <a href="https://instagram.com/hrgrey.clay" target="_blank" rel="noopener">Instagram</a>
        <span class="dot">·</span>
        <a href="mailto:hrgrey.clay@gmail.com">hrgrey.clay@gmail.com</a>
      </p>
    </div>
  </footer>

  <!-- Lightbox modal -->
  <div class="lightbox" aria-hidden="true">
    <button class="lightbox-close" aria-label="Close">×</button>
    <img class="lightbox-image" alt="" />
    <figcaption class="lightbox-caption"></figcaption>
  </div>

  <script src="script.js"></script>
</body>
</html>
